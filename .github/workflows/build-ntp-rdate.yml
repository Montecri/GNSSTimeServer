name: Firmware release (NTP/RDATE - Arduino/PlatformIO)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'ntp-rdate-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/NTP_RDATE

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('src/NTP_RDATE/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Extract build version
        id: ver
        run: |
          # Strip 'ntp-rdate-' prefix from tag (e.g. 'ntp-rdate-v1.0.5' -> 'v1.0.5')
          # For manual dispatch, this is the branch name (e.g. 'main')
          VERSION="${GITHUB_REF_NAME#ntp-rdate-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Building with version: $VERSION"

      - name: Run PlatformIO
        env:
          VERSION: ${{ steps.ver.outputs.version_no_v }}
        run: pio run

      - name: Rename firmware binaries
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mv .pio/build/ESP32Duino/firmware.bin .pio/build/ESP32Duino/firmware-ESP32Duino-$V.bin
          mv .pio/build/Amica/firmware.bin .pio/build/Amica/firmware-Amica-$V.bin
          mv .pio/build/ESP32Duino_Ethernet/firmware.bin .pio/build/ESP32Duino_Ethernet/firmware-ESP32Duino_Ethernet-$V.bin

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ntp-rdate
          path: src/NTP_RDATE/.pio/build/**/firmware-*.bin

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: src/NTP_RDATE/.pio/build/**/firmware-*.bin
