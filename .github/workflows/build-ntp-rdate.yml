name: Firmware release (NTP/RDATE - Arduino/PlatformIO)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/NTP_RDATE

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('src/NTP_RDATE/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Extract build version
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Run PlatformIO
        env:
          VERSION: ${{ steps.get_version.outputs.version-without-v }}
        run: pio run

      - name: Rename firmware binaries
        run: |
          mv .pio/build/ESP32Duino/firmware.bin .pio/build/ESP32Duino/firmware-ESP32Duino-$GITHUB_REF_NAME.bin
          mv .pio/build/Amica/firmware.bin .pio/build/Amica/firmware-Amica-$GITHUB_REF_NAME.bin
          mv .pio/build/ESP32Duino_Ethernet/firmware.bin .pio/build/ESP32Duino_Ethernet/firmware-ESP32Duino_Ethernet-$GITHUB_REF_NAME.bin

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ntp-rdate
          path: src/NTP_RDATE/.pio/build/**/firmware-*.bin

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: src/NTP_RDATE/.pio/build/**/firmware-*.bin
