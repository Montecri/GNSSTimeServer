name: Firmware release (PTP Master - ESP-IDF)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32p4
          path: 'src/PTP/Master'

      - name: Collect and rename firmware binaries
        run: |
          mkdir -p artifacts
          # Main application binary (project name comes from CMakeLists.txt)
          for f in src/PTP/Master/build/*.bin; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .bin)
            cp "$f" "artifacts/${base}-PTP_Master-${GITHUB_REF_NAME}.bin"
          done
          # Also include bootloader and partition table for full flashing
          if [ -f src/PTP/Master/build/bootloader/bootloader.bin ]; then
            cp src/PTP/Master/build/bootloader/bootloader.bin \
               "artifacts/bootloader-PTP_Master-${GITHUB_REF_NAME}.bin"
          fi
          if [ -f src/PTP/Master/build/partition_table/partition-table.bin ]; then
            cp src/PTP/Master/build/partition_table/partition-table.bin \
               "artifacts/partition-table-PTP_Master-${GITHUB_REF_NAME}.bin"
          fi
          ls -la artifacts/

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ptp-master
          path: artifacts/*.bin

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/*.bin
