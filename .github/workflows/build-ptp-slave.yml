name: Firmware release (PTP Slave - ESP-IDF)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ESP-IDF build + merge
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: 'src/PTP/Slave'
          command: 'idf.py build && idf.py merge-bin -o firmware-merged.bin'

      - name: Collect and rename firmware binaries
        run: |
          mkdir -p artifacts
          BUILD=src/PTP/Slave/build

          # Single merged image (flash at 0x0 — easiest for end users)
          if [ -f "$BUILD/firmware-merged.bin" ]; then
            cp "$BUILD/firmware-merged.bin" \
               "artifacts/PTP_Slave-${GITHUB_REF_NAME}-merged.bin"
          fi

          # Application binary (flash at 0x10000 — for OTA / app-only updates)
          for f in "$BUILD"/*.bin; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .bin)
            # Skip the merged image (already copied above with a clearer name)
            [ "$name" = "firmware-merged" ] && continue
            cp "$f" "artifacts/PTP_Slave-${GITHUB_REF_NAME}-app.bin"
          done

          # Bootloader (flash at 0x1000) and partition table (flash at 0x8000)
          [ -f "$BUILD/bootloader/bootloader.bin" ] && \
            cp "$BUILD/bootloader/bootloader.bin" \
               "artifacts/PTP_Slave-${GITHUB_REF_NAME}-bootloader.bin"
          [ -f "$BUILD/partition_table/partition-table.bin" ] && \
            cp "$BUILD/partition_table/partition-table.bin" \
               "artifacts/PTP_Slave-${GITHUB_REF_NAME}-partition-table.bin"
          [ -f "$BUILD/ota_data_initial.bin" ] && \
            cp "$BUILD/ota_data_initial.bin" \
               "artifacts/PTP_Slave-${GITHUB_REF_NAME}-ota-data.bin"

          ls -la artifacts/

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ptp-slave
          path: artifacts/*.bin

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/*.bin
