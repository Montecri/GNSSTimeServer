name: Firmware release (PTP Slave - ESP-IDF)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'ptp-slave-v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract build version
        id: ver
        run: |
          # Strip 'ptp-slave-' prefix from tag (e.g. 'ptp-slave-v1.0.5' -> 'v1.0.5')
          # For manual dispatch, this is the branch name (e.g. 'main')
          VERSION="${GITHUB_REF_NAME#ptp-slave-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building with version: $VERSION"

      - name: ESP-IDF build + merge
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: 'src/PTP/Slave'
          command: 'idf.py build && idf.py merge-bin -o firmware-merged.bin'

      - name: Collect firmware binaries
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p artifacts
          BUILD=src/PTP/Slave/build

          # Merged image — for first-time flashing (offset 0x0)
          cp "$BUILD/firmware-merged.bin" \
             "artifacts/PTP_Slave-$V-full.bin"

          # App-only binary — for OTA updates
          for f in "$BUILD"/*.bin; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              firmware-merged.bin|ota_data_initial.bin) continue ;;
            esac
            cp "$f" "artifacts/PTP_Slave-$V-ota.bin"
          done

          ls -la artifacts/

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ptp-slave
          path: artifacts/*.bin

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/*.bin
